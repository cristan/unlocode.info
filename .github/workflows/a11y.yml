name: Accessibility

on:
  pull_request:

jobs:
  a11y:
    name: WCAG accessibility scan
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: unlocode
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mysqli
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-progress

      - name: Create CI secrets
        run: |
          {
            echo '<?php'
            echo '$db_host     = "127.0.0.1";'
            echo '$db_user     = "root";'
            echo '$db_password = "root";'
            echo '$db_database = "unlocode";'
            echo '$maps_key    = "";'
            echo '$import_user   = "admin";'
            echo '$import_secret = "secret";'
          } > secrets.php

      - name: Seed database
        run: mysql -h 127.0.0.1 -u root -proot unlocode < e2e/seed.sql

      - name: Start PHP development server
        run: php -d "include_path=.:$(pwd)" -S 127.0.0.1:8080 e2e/router.php > /tmp/php-server.log 2>&1 &

      - name: Verify DB seed
        run: mysql -h 127.0.0.1 -u root -proot unlocode -e "SELECT country, location, name FROM CodeList;"

      - name: Test PHP include chain directly
        run: |
          cd country && php -d "include_path=.:$(pwd)/.." -r "
            \$_GET['countryCode'] = 'NL';
            include '../include.php';
            include 'countryLoader.php';
            include '../countryList.php';
            \$loader = new CountryLoader();
            \$result = \$loader->loadCountry('NL');
            echo count(\$result) . ' entries found' . PHP_EOL;
          "
          cd "$GITHUB_WORKSPACE/details" && php -d "include_path=.:$(pwd)/.." -r "
            include '../secrets.php';
            include '../include.php';
            include 'detailsLoader.php';
            \$loader = new DetailsLoader();
            \$result = \$loader->loadDetails('NLRTM');
            if (\$result) {
              echo 'Detail page OK: title=' . \$result->title . PHP_EOL;
            } else {
              echo 'Detail page: loadDetails returned null' . PHP_EOL;
            }
          "

      - name: Verify PHP server renders correctly
        run: |
          curl --retry 10 --retry-connrefused --retry-delay 1 -s http://127.0.0.1:8080/ | grep -q '<html' || (echo "Homepage did not return HTML" && exit 1)
          COUNTRY=$(curl -s http://127.0.0.1:8080/country/NL)
          HTTP_CODE=$(curl -o /dev/null -s -w "%{http_code}" http://127.0.0.1:8080/country/NL)
          echo "$COUNTRY" | grep -q 'lang=' || {
            echo "::error::HTTP $HTTP_CODE | response: $(echo "$COUNTRY" | head -3 | tr '\n' '|') | phplog: $(cat /tmp/php-server.log | grep -v '^$' | tail -5 | tr '\n' '|')"
            exit 1
          }
          DETAIL=$(curl -s http://127.0.0.1:8080/NLRTM)
          HTTP_CODE_DETAIL=$(curl -o /dev/null -s -w "%{http_code}" http://127.0.0.1:8080/NLRTM)
          echo "$DETAIL" | grep -q 'lang=' || {
            echo "::error::Detail page HTTP $HTTP_CODE_DETAIL | response: $(echo "$DETAIL" | head -5 | tr '\n' '|') | phplog: $(cat /tmp/php-server.log | grep -v '^$' | tail -10 | tr '\n' '|')"
            exit 1
          }

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: e2e/package-lock.json

      - name: Install Node.js dependencies
        working-directory: e2e
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('e2e/package-lock.json') }}

      - name: Install Playwright browsers (Chromium only)
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run accessibility tests
        working-directory: e2e
        run: npx playwright test --project=chromium

      - name: Upload a11y report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: a11y-report
          path: e2e/a11y-report/
